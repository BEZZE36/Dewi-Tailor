<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin — Dewi Tailor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#9B6B7A', 'dark-brown': '#2D1B1B', 'warm-white': '#FDF8F5', cream: '#E8D5C4' },
                    fontFamily: { heading: ['Playfair Display', 'serif'], body: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(232, 213, 196, 0.5); }
        html.dark body { background: #0f090b; }
        html.dark .glass { background: rgba(26, 16, 20, 0.9); border-color: #3d2535; }
    </style>
</head>
<body class="font-body bg-warm-white text-dark-brown min-h-screen flex items-center justify-center p-6">
    <script>if (localStorage.getItem('dewi-dark') === '1') document.documentElement.classList.add('dark');</script>

    <div class="max-w-md w-full animate-fade-in">
        <div class="text-center mb-10">
            <h1 class="font-heading text-4xl font-bold text-primary italic mb-2">Dewi Tailor</h1>
            <p class="text-gray-500 text-sm tracking-widest uppercase">Admin Control Panel</p>
        </div>

        <div class="glass rounded-3xl p-10 shadow-2xl">
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">Email Admin</label>
                    <input type="email" id="email" required placeholder="admin@dewi-tailor.com" 
                        class="w-full bg-white/50 dark:bg-black/20 border border-cream dark:border-gray-800 rounded-2xl px-6 py-4 outline-none focus:border-primary transition-all dark:text-white">
                </div>
                <div class="relative">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">Kata Sandi</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full bg-white/50 dark:bg-black/20 border border-cream dark:border-gray-800 rounded-2xl px-6 py-4 outline-none focus:border-primary transition-all dark:text-white">
                    <button type="button" id="toggle-pw" class="absolute right-6 top-11 text-gray-400 hover:text-primary">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                
                <button type="submit" id="btn-submit" class="w-full bg-primary text-white py-5 rounded-2xl font-bold shadow-lg hover:brightness-110 transition-all">
                    Masuk Sekarang
                </button>
            </form>
            <div id="error-msg" class="hidden mt-6 p-4 bg-red-50 text-red-500 text-xs text-center rounded-xl font-medium border border-red-100"></div>
        </div>

        <p class="text-center mt-10 text-gray-400 text-xs tracking-widest uppercase">
            &copy; 2026 Dewi Tailor Admin System
        </p>
    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const form = document.getElementById('login-form');
        const btn = document.getElementById('btn-submit');
        const errorMsg = document.getElementById('error-msg');
        const pwInput = document.getElementById('password');
        const togglePw = document.getElementById('toggle-pw');

        togglePw.onclick = () => {
            pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = "Memverifikasi...";
            errorMsg.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, pwInput.value);
                window.location.href = "admin.html";
            } catch (error) {
                btn.disabled = false;
                btn.textContent = "Masuk Sekarang";
                errorMsg.textContent = "Email atau password admin salah!";
                errorMsg.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
