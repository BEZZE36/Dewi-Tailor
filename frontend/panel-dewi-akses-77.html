<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Terbatas — Dewi Tailor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#9B6B7A', 'dark-brown': '#2D1B1B', 'warm-white': '#FDF8F5', cream: '#E8D5C4', accent: '#06B6D4' },
                    fontFamily: { heading: ['Playfair Display', 'serif'], body: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>emailjs.init("bPfZl31p5UPdtbBHV");</script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(232, 213, 196, 0.5); }
        html.dark body { background: #0f090b; }
        html.dark .glass { background: rgba(26, 16, 20, 0.9); border-color: #3d2535; }
        .pin-box { width: 45px; height: 55px; text-align: center; font-size: 1.5rem; font-weight: bold; border-radius: 12px; background: rgba(0,0,0,0.05); border: 1px solid #E8D5C4; transition: all 0.3s; }
        .pin-box:focus { border-color: #9B6B7A; outline: none; box-shadow: 0 0 10px rgba(155,107,122,0.2); }
        html.dark .pin-box { background: rgba(255,255,255,0.05); border-color: #3d2535; color: white; }
    </style>
</head>
<body class="font-body bg-warm-white text-dark-brown min-h-screen flex items-center justify-center p-6">
    <script>if (localStorage.getItem('dewi-dark') === '1') document.documentElement.classList.add('dark');</script>

    <div class="max-w-md w-full animate-fade-in">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield-check" class="text-primary w-8 h-8"></i>
            </div>
            <h1 class="font-heading text-4xl font-bold text-primary italic mb-2">Dewi Admin</h1>
            <p class="text-gray-500 text-xs tracking-widest uppercase">Secret Access Portal</p>
        </div>

        <div class="glass rounded-3xl p-10 shadow-2xl relative overflow-hidden">
            <!-- STEP 1: LOGIN -->
            <div id="step-login">
                <form id="login-form" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Email Admin</label>
                        <input type="email" id="email" required placeholder="admin@dewi-tailor.com" 
                            class="w-full bg-white/50 dark:bg-black/20 border border-cream dark:border-gray-800 rounded-2xl px-6 py-4 outline-none focus:border-primary transition-all dark:text-white">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Kata Sandi</label>
                        <div class="relative">
                            <input type="password" id="password" required placeholder="••••••••" 
                                class="w-full bg-white/50 dark:bg-black/20 border border-cream dark:border-gray-800 rounded-2xl px-6 py-4 outline-none focus:border-primary transition-all dark:text-white">
                            <button type="button" id="toggle-pw" class="absolute right-6 top-4 text-gray-400 hover:text-primary">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <button type="submit" id="btn-login" class="bg-primary text-white py-4 rounded-2xl font-bold shadow-lg shadow-primary/20 hover:brightness-110 transition-all text-xs">
                            Masuk (Password)
                        </button>
                        <button type="button" id="btn-otp-request" class="bg-white dark:bg-white/10 border border-cream dark:border-white/20 text-dark-brown dark:text-white py-4 rounded-2xl font-bold text-xs hover:bg-cream dark:hover:bg-white/20 transition-all">
                            Minta OTP
                        </button>
                    </div>
                </form>
            </div>

            <!-- STEP 2: OTP VERIFICATION -->
            <div id="step-otp" class="hidden text-center space-y-8">
                <div>
                    <h3 class="text-xl font-bold mb-2">Verifikasi OTP</h3>
                    <p id="otp-hint" class="text-xs text-gray-500">Kode dikirim ke email Anda</p>
                </div>
                <div class="flex justify-center gap-2">
                    <input class="pin-box" type="text" maxlength="1" inputmode="numeric">
                    <input class="pin-box" type="text" maxlength="1" inputmode="numeric">
                    <input class="pin-box" type="text" maxlength="1" inputmode="numeric">
                    <input class="pin-box" type="text" maxlength="1" inputmode="numeric">
                    <input class="pin-box" type="text" maxlength="1" inputmode="numeric">
                    <input class="pin-box" type="text" maxlength="1" inputmode="numeric">
                </div>
                <button id="btn-verify-otp" class="w-full bg-accent text-white py-5 rounded-2xl font-bold shadow-lg hover:brightness-110 transition-all">
                    Verifikasi & Masuk
                </button>
                <button type="button" onclick="location.reload()" class="text-xs text-gray-400 hover:text-primary uppercase font-bold tracking-widest">
                    Ganti Email
                </button>
            </div>

            <div id="status-msg" class="hidden mt-6 p-4 bg-red-50 text-red-500 text-[10px] text-center rounded-xl font-bold border border-red-100 uppercase tracking-wider"></div>
        </div>

        <p class="text-center mt-10 text-gray-400 text-[10px] tracking-widest uppercase">
            &copy; 2026 Dewi Tailor Secret Portal
        </p>
    </div>

    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, getDoc, setDoc, Timestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        lucide.createIcons();

        const loginForm = document.getElementById('login-form');
        const statusMsg = document.getElementById('status-msg');
        const otpStep = document.getElementById('step-otp');
        const loginStep = document.getElementById('step-login');
        const pinBoxes = document.querySelectorAll('.pin-box');
        let adminEmail = "";

        // Toggle Password
        document.getElementById('toggle-pw').onclick = () => {
            const pwInput = document.getElementById('password');
            pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
        };

        // PIN Box Logic
        pinBoxes.forEach((box, i) => {
            box.oninput = () => {
                box.value = box.value.replace(/\D/g,'').slice(0,1);
                if(box.value && i < 5) pinBoxes[i+1].focus();
            };
            box.onkeydown = (e) => {
                if(e.key === 'Backspace' && !box.value && i > 0) pinBoxes[i-1].focus();
            };
        });

        // 1. LOGIN PASSWORD
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.disabled = true; btn.textContent = "Sedang Masuk...";
            statusMsg.classList.add('hidden');

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const res = await signInWithEmailAndPassword(auth, email, password);
                
                // AUTO-UPGRADE: Jika masuk lewat sini, otomatis jadikan admin
                const user = res.user;
                await setDoc(doc(db, "users", user.uid), {
                    username: "Admin",
                    email: email,
                    role: "admin",
                    uid: user.uid
                }, { merge: true });

                sessionStorage.setItem('adminVerified', 'true');
                window.location.href = "admin.html";
            } catch (err) {
                btn.disabled = false; btn.textContent = "Masuk (Password)";
                statusMsg.textContent = "Login Gagal: " + err.message;
                statusMsg.classList.remove('hidden');
            }
        };

        // 2. MINTA OTP
        document.getElementById('btn-otp-request').onclick = async () => {
            const email = document.getElementById('email').value;
            if(!email) { statusMsg.textContent = "Email belum diisi!"; statusMsg.classList.remove('hidden'); return; }
            
            const btn = document.getElementById('btn-otp-request');
            btn.disabled = true; btn.textContent = "Kirim...";
            
            try {
                adminEmail = email;
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                await setDoc(doc(db, "mail_otps", email), {
                    otp: otp, createdAt: Timestamp.now(),
                    expiresAt: new Timestamp(Math.floor(Date.now()/1000) + 600, 0)
                });
                await emailjs.send("service_iem0a2q", "template_ko5cbn5", { to_email: email, to_name: "Admin", otp: otp });
                
                loginStep.classList.add('hidden');
                otpStep.classList.remove('hidden');
                document.getElementById('otp-hint').textContent = `Kode dikirim ke ${email}`;
            } catch (err) {
                btn.disabled = false; btn.textContent = "Minta OTP";
                statusMsg.textContent = "Gagal kirim OTP: " + err.message;
                statusMsg.classList.remove('hidden');
            }
        };

        // 3. VERIFIKASI OTP
        document.getElementById('btn-verify-otp').onclick = async () => {
            const otpInput = [...pinBoxes].map(b => b.value).join('');
            if(otpInput.length < 6) return;
            
            const btn = document.getElementById('btn-verify-otp');
            btn.disabled = true; btn.textContent = "Verifikasi...";
            
            try {
                const snap = await getDoc(doc(db, "mail_otps", adminEmail));
                if (!snap.exists()) throw new Error("OTP tidak ditemukan.");
                
                const data = snap.data();
                if (data.otp !== otpInput) throw new Error("Kode OTP salah!");
                if (data.expiresAt.toDate() < new Date()) throw new Error("Kode kadaluarsa.");

                await deleteDoc(doc(db, "mail_otps", adminEmail));

                // OTP Valid! Set session dan paksa role di Firestore
                sessionStorage.setItem('adminVerified', 'true');
                
                // Login Admin (Gunakan password default admin jika pakai OTP)
                const res = await signInWithEmailAndPassword(auth, adminEmail, "DewiTailorAdmin123!");
                await setDoc(doc(db, "users", res.user.uid), { role: "admin", email: adminEmail }, { merge: true });
                
                window.location.href = "admin.html";
            } catch (err) {
                btn.disabled = false; btn.textContent = "Verifikasi & Masuk";
                statusMsg.textContent = err.message;
                statusMsg.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
