<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Pesanan — Dewi Tailor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#9B6B7A',
                        secondary: '#C9A84C',
                        'warm-white': '#FDF8F5',
                        'dark-brown': '#2D1B1B',
                        cream: '#E8D5C4'
                    },
                    fontFamily: {
                        heading: ['Playfair Display', 'serif'],
                        body: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(232, 213, 196, 0.5); }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-proses { background: #DBEAFE; color: #1E40AF; }
        .status-selesai { background: #D1FAE5; color: #065F46; }
        .status-diambil { background: #F3F4F6; color: #374151; }

        /* Dark Mode Styles */
        html.dark body { background: #1a1014; color: #f0e8ec; }
        html.dark .glass-card { background: rgba(46, 28, 34, 0.8); border-color: #3d2535; }
        html.dark .bg-white { background: #231519 !important; border-color: #3d2535 !important; }
        html.dark .text-gray-500, html.dark .text-gray-400, html.dark .text-gray-600 { color: #c9a8b5 !important; }
        html.dark input { background: #2e1c22 !important; border-color: #3d2535 !important; color: white !important; }
        html.dark .bg-primary\/5 { background: rgba(155, 107, 122, 0.15); }
    </style>
</head>
<body class="font-body text-dark-brown min-h-screen transition-colors duration-300 bg-warm-white">

    <nav class="p-6">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="font-heading text-2xl font-bold text-primary italic flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Dewi Tailor
            </a>
            <div class="flex items-center gap-4">
                <button id="dark-toggle" class="w-9 h-9 rounded-full border border-cream flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-all">
                    <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
                <a href="pre-order.html" class="bg-primary text-white px-6 py-2 rounded-full font-semibold hover:bg-opacity-90 transition-all text-sm">Pre-Order</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12 max-w-2xl">
        <div class="text-center mb-12">
            <h1 class="font-heading text-4xl font-bold mb-4">Cek Status Pesanan</h1>
            <p class="text-gray-500">Lihat status pesanan Anda secara real-time.</p>
        </div>

        <div id="search-section" class="glass-card rounded-3xl p-8 mb-8">
            <div class="bg-primary/5 rounded-2xl p-6 mb-8 flex items-start gap-4">
                <div class="bg-white p-3 rounded-xl shadow-sm">
                    <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </div>
                <p class="text-sm text-gray-600 leading-relaxed">
                    Pesanan akan otomatis tampil jika Anda sudah login. Atau masukkan email Anda di bawah ini.
                </p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-3">Email Anda</label>
                    <input type="email" id="email-search" placeholder="nama@email.com" 
                        class="w-full bg-white border border-cream rounded-2xl px-6 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                </div>

                <button id="check-btn" onclick="window.checkStatusByEmail()" class="w-full bg-primary text-white py-4 rounded-2xl font-bold text-lg hover:brightness-110 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    Cari Pesanan
                </button>
            </div>
            <p id="error-msg" class="text-red-500 text-sm mt-4 text-center hidden"></p>
        </div>

        <div id="results-section" class="space-y-4"></div>

        <div id="loading-state" class="hidden py-12 text-center">
            <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-400">Mencari pesanan...</p>
        </div>
    </main>

    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // --- DARK MODE ---
        function applyDark(on) {
            document.documentElement.classList.toggle('dark', on);
            document.getElementById('icon-moon')?.classList.toggle('hidden', on);
            document.getElementById('icon-sun')?.classList.toggle('hidden', !on);
            localStorage.setItem('dewi-dark', on ? '1' : '0');
        }
        applyDark(localStorage.getItem('dewi-dark') === '1');
        document.getElementById('dark-toggle')?.addEventListener('click', () => applyDark(!document.documentElement.classList.contains('dark')));

        // --- AUTO CHECK ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('email-search').value = user.email;
                window.checkStatusByEmail(user.email);
            }
        });

        window.checkStatusByEmail = async (providedEmail) => {
            const email = providedEmail || document.getElementById('email-search').value.trim();
            const results = document.getElementById('results-section');
            const loading = document.getElementById('loading-state');
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('check-btn');

            if (!email) return;

            errorMsg.classList.add('hidden');
            results.innerHTML = '';
            loading.classList.remove('hidden');
            if (btn) btn.disabled = true;

            try {
                const q = query(collection(db, "orders"), where("email", "==", email));
                const snap = await getDocs(q);
                loading.classList.add('hidden');

                if (snap.empty) {
                    results.innerHTML = `<div class="text-center py-12 bg-white rounded-3xl border border-dashed border-cream"><p class="text-gray-400 text-sm">Tidak ada pesanan ditemukan.</p></div>`;
                } else {
                    let orders = [];
                    snap.forEach(doc => orders.push({id: doc.id, ...doc.data()}));
                    orders.sort((a,b) => (b.tanggalMasuk?.seconds || 0) - (a.tanggalMasuk?.seconds || 0));
                    
                    orders.forEach(order => {
                        const date = order.tanggalMasuk ? order.tanggalMasuk.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}) : '-';
                        results.innerHTML += `
                            <div class="glass-card rounded-3xl p-6 shadow-sm border-l-4 border-l-primary">
                                <div class="flex justify-between items-start mb-4">
                                    <div><p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">ID ANTRIAN</p><h3 class="font-bold text-lg">#${String(order.nomorAntrian || 0).padStart(4,'0')}</h3></div>
                                    <span class="status-badge status-${order.status || 'pending'}">${order.status || 'Menunggu'}</span>
                                </div>
                                <div class="grid grid-cols-2 gap-4 text-xs">
                                    <div><p class="text-gray-400">Jenis Pakaian</p><p class="font-semibold">${order.jenisPakaian || '-'}</p></div>
                                    <div><p class="text-gray-400">Tanggal Pesan</p><p class="font-semibold">${date}</p></div>
                                </div>
                                <div class="mt-4 pt-4 border-t border-cream flex justify-between items-center text-xs">
                                    <span class="text-gray-400 italic">Estimasi: ${order.estimasiSelesai || 'Akan dikonfirmasi'}</span>
                                    <p class="text-primary font-bold text-sm">${order.harga ? 'Rp ' + order.harga.toLocaleString('id-ID') : 'Menunggu Fitting'}</p>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                loading.classList.add('hidden');
                errorMsg.textContent = "Gagal memuat data."; errorMsg.classList.remove('hidden');
            } finally { if(btn) btn.disabled = false; }
        };
    </script>
</body>
</html>
